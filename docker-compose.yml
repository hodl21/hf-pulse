version: '3.8'

# Shared config reused by all Airflow services
x-airflow-common:
  &airflow-common
  image: apache/airflow:2.8.1-python3.11
  environment:
    &airflow-common-env
    # Run tasks locally — no separate worker needed
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    # Airflow's internal database connection
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    # New DAGs start paused — you trigger first run manually
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    # Don't load built-in example DAGs
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    # Enable username/password login for the UI
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    # Makes your project folders importable inside Airflow
    PYTHONPATH: /opt/airflow
  # Mount local folders into the container
  # Left = your Mac, Right = inside Docker
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./ingestion:/opt/airflow/ingestion
    - ./transforms:/opt/airflow/transforms
    - ./analytics:/opt/airflow/analytics
    - ./data:/opt/airflow/data
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:

  # Airflow's internal bookkeeping database
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: always

  # The UI at localhost:8080
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    environment:
      <<: *airflow-common-env
      # Reduce workers to save memory on local machine
      AIRFLOW__WEBSERVER__WORKERS: '1'
      # Increase timeout to 300 seconds
      AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: '300'
    ports:
      - 8080:8080
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # Watches DAGs and triggers tasks on schedule
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # Runs once on first startup to set up db and admin user
  # No user override here — runs as default airflow user (50000)
  # so it can access Airflow's Python packages
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username admin \
          --firstname admin \
          --lastname admin \
          --role Admin \
          --email admin@example.com \
          --password admin
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'

# Persistent storage that survives container restarts
volumes:
  postgres-db-volume: